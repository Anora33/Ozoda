<!DO<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 3D QO'L BILAN ZARRACHALAR - ORIGINAL</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #00ffff;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        #status {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #hand-status {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00ffff;
            z-index: 100;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .camera-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #00ffff;
            color: black;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 0 30px #00ffff;
            animation: pulse 2s infinite;
            border: 2px solid white;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .camera-btn:hover {
            background: white;
            box-shadow: 0 0 50px white;
        }

        #video-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            z-index: 2000;
            object-fit: cover;
            transform: scaleX(-1);
            display: none;
        }

        .particle-count {
            font-size: 24px;
            color: #00ffff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Kamera tugmasi -->
    <button class="camera-btn" onclick="startCamera()">
        📷 KAMERANI ISHGA TUSHIRISH
    </button>

    <!-- Asosiy UI (boshida yashirin) -->
    <div id="main-ui" style="display: none;">
        <div id="info">
            <h1>✨ 3D QO'L BILAN ZARRACHALAR</h1>
            <p>🖐️ <strong style="color: #00ffff;">YIG'ISH:</strong> Barmoqlarni yig'ing (musht) → Zarrachalar to'planadi</p>
            <p>✋ <strong style="color: #ff66aa;">SACHRASH:</strong> Kaftni oching → Zarrachalar portlab sachraydi!</p>
            <p>🎭 Barmoq soni: 1⭐ 2❤️ 3🪐 4🌸 5🎆</p>
        </div>

        <div id="status">
            ⏳ Kamera ishga tushmoqda...
        </div>

        <div id="hand-status">
            <div>🖐️ Qo'l holati</div>
            <div id="hand-state-text" style="font-size: 20px; margin-top: 10px;">⏳ Aniqlanmoqda...</div>
            <div id="finger-count" style="font-size: 18px; color: #00ffff;">Barmoqlar: 0</div>
        </div>
    </div>

    <!-- Kamera video -->
    <video id="video-feedback" autoplay playsinline></video>

    <!-- Kutubxonalar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // =========================================
        // KAMERA FUNKSIYASI
        // =========================================
        let cameraStream = null;
        let videoFeedback = document.getElementById('video-feedback');
        let mainUI = document.getElementById('main-ui');
        let cameraBtn = document.querySelector('.camera-btn');

        window.startCamera = async function() {
            try {
                // Kamerani so'rash
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    }
                });

                cameraStream = stream;
                videoFeedback.srcObject = stream;
                await videoFeedback.play();

                // Tugmani yashirib, asosiy UI ni ko'rsatish
                cameraBtn.style.display = 'none';
                mainUI.style.display = 'block';
                videoFeedback.style.display = 'block';

                document.getElementById('status').innerHTML = '✅ Kamera ishlamoqda! Qo\'lingizni ko\'rsating...';

                // MediaPipe ni ishga tushirish
                startMediaPipe();

            } catch(err) {
                alert('❌ Kamera ishlamadi!\n\nSababi: ' + err.message + '\n\n1. Kamera ulanganligini tekshiring\n2. Brauzerda ruxsat bering\n3. Boshqa dasturda kamerani sinab ko\'ring');
                console.error(err);
            }
        };

        // =========================================
        // MEDIAPIPE HANDS
        // =========================================
        let handPresent = false;
        let handX = 0, handY = 0, handZ = 0;
        let isOpen = true;
        let fingerCount = 0;

        async function startMediaPipe() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            const camera = new Camera(videoFeedback, {
                onFrame: async () => {
                    await hands.send({ image: videoFeedback });
                },
                width: 640,
                height: 480
            });

            hands.onResults((results) => {
                const handStateText = document.getElementById('hand-state-text');
                const fingerCountEl = document.getElementById('finger-count');
                const statusEl = document.getElementById('status');

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handPresent = true;
                    const landmarks = results.multiHandLandmarks[0];

                    // Qo'l markazi
                    let cx = 0, cy = 0, cz = 0;
                    for (let i = 0; i < 21; i++) {
                        cx += landmarks[i].x;
                        cy += landmarks[i].y;
                        cz += landmarks[i].z;
                    }
                    handX = cx / 21;
                    handY = cy / 21;
                    handZ = cz / 21;

                    // Barmoqlar soni
                    const tips = [4, 8, 12, 16, 20];
                    const pips = [2, 6, 10, 14, 18];
                    let count = 0;

                    for (let i = 0; i < 5; i++) {
                        const tip = landmarks[tips[i]];
                        const pip = landmarks[pips[i]];

                        if (i === 0) {
                            const base = landmarks[3];
                            if (Math.abs(tip.x - base.x) > 0.05) count++;
                        } else {
                            if (tip.y < pip.y) count++;
                        }
                    }

                    fingerCount = count;
                    fingerCountEl.innerHTML = `Barmoqlar: ${fingerCount}`;

                    // Holat: ochiq yoki yopiq
                    isOpen = count >= 3;

                    if (isOpen) {
                        statusEl.innerHTML = '✅ Qo\'l aniqlandi - ✋ KAFT OCHIQ (SACHRASH)';
                        statusEl.style.background = 'rgba(255,100,100,0.3)';
                        statusEl.style.border = '1px solid #ff6666';
                        handStateText.innerHTML = '✋ KAFT OCHIQ - SACHRASH';
                        handStateText.style.color = '#ff8888';
                    } else {
                        statusEl.innerHTML = '✅ Qo\'l aniqlandi - 🤛 MUSHT (YIG\'ISH)';
                        statusEl.style.background = 'rgba(100,255,100,0.3)';
                        statusEl.style.border = '1px solid #66ff66';
                        handStateText.innerHTML = '🤛 MUSHT - YIG\'ISH';
                        handStateText.style.color = '#88ff88';
                    }

                } else {
                    handPresent = false;
                    statusEl.innerHTML = '👋 Qo\'lingizni kameraga ko\'rsating...';
                    statusEl.style.background = 'rgba(0,0,0,0.7)';
                    statusEl.style.border = '1px solid rgba(255,255,255,0.3)';
                    handStateText.innerHTML = '⏳ Qo\'l aniqlanmadi';
                    fingerCountEl.innerHTML = 'Barmoqlar: 0';
                }
            });

            await camera.start();
        }

        // =========================================
        // THREE.JS 3D SAHNA
        // =========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera3d = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3d.position.set(0, 2, 25);
        camera3d.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);

        // =========================================
        // ZARRACHALAR
        // =========================================
        const PARTICLE_COUNT = 3000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = [];

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const radius = Math.pow(Math.random(), 1.5) * 12;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            positions[i*3] = Math.sin(phi) * Math.cos(theta) * radius;
            positions[i*3+1] = Math.sin(phi) * Math.sin(theta) * radius;
            positions[i*3+2] = Math.cos(phi) * radius;

            velocities.push({
                x: (Math.random() - 0.5) * 0.2,
                y: (Math.random() - 0.5) * 0.2,
                z: (Math.random() - 0.5) * 0.2
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.15,
            transparent: true,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // =========================================
        // YULDUZLAR
        // =========================================
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 400;
            starPositions[i+1] = (Math.random() - 0.5) * 400;
            starPositions[i+2] = (Math.random() - 0.5) * 400 - 100;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            transparent: true,
            opacity: 0.8
        }));
        scene.add(stars);

        // =========================================
        // ZARRACHALARNI YANGILASH
        // =========================================
        function updateParticles() {
            if (!handPresent) return;

            const positions = geometry.attributes.position.array;

            let centerX = (handX - 0.5) * 30;
            let centerY = -(handY - 0.5) * 30;
            let centerZ = handZ * 15;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let ix = i * 3;
                let iy = i * 3 + 1;
                let iz = i * 3 + 2;

                let dx = positions[ix] - centerX;
                let dy = positions[iy] - centerY;
                let dz = positions[iz] - centerZ;
                let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                if (isOpen) {
                    // SACHRASH
                    if (dist < 15) {
                        let force = (15 - dist) * 0.02;
                        positions[ix] += (dx / (dist + 0.1)) * force + velocities[i].x;
                        positions[iy] += (dy / (dist + 0.1)) * force + velocities[i].y;
                        positions[iz] += (dz / (dist + 0.1)) * force + velocities[i].z;
                    }
                } else {
                    // YIG'ISH
                    positions[ix] += (centerX - positions[ix]) * 0.03;
                    positions[iy] += (centerY - positions[iy]) * 0.03;
                    positions[iz] += (centerZ - positions[iz]) * 0.03;
                }

                // Chegaralar
                if (Math.abs(positions[ix]) > 20) positions[ix] *= -0.95;
                if (Math.abs(positions[iy]) > 20) positions[iy] *= -0.95;
                if (Math.abs(positions[iz]) > 20) positions[iz] *= -0.95;
            }

            geometry.attributes.position.needsUpdate = true;
        }

        // =========================================
        // ANIMATSIYA
        // =========================================
        function animate() {
            requestAnimationFrame(animate);

            updateParticles();

            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;

            renderer.render(scene, camera3d);
        }

        animate();

        // =========================================
        // RESIZE
        // =========================================
        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
